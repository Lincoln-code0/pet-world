<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet World — Login / Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="../index.html" class="logo">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24">
        <circle class="logo-ring" cx="12" cy="12" r="10" stroke-width="2"/>
        <circle class="logo-inner" cx="12" cy="12" r="5"/>
        <path d="M12 2a10 10 0 0 0-8 4" fill="var(--color-bg)" stroke="none"/>
        <path d="M12 2a10 10 0 0 1 8 4"  fill="var(--color-bg)" stroke="none"/>
      </svg>
      <span class="logo-text">PET WORLD</span>
    </a>
    <nav class="main-nav">
      <a href="food.html"        class="nav-link">Food &amp; Treats</a>
      <a href="toys.html"        class="nav-link">Toys &amp; Fun</a>
      <a href="grooming.html"    class="nav-link">Grooming</a>
      <a href="accessories.html" class="nav-link">Accessories</a>
      <a href="vet-care.html"    class="nav-link">Vet Care</a>
      <a href="adoption.html"    class="nav-link">Adoption</a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg id="sun-icon"  xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login"    onclick="switchForm('login')">Login</div>
      <div class="auth-tab"        id="tab-register" onclick="switchForm('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div class="auth-form" id="login-form">
      <h2>Welcome Back</h2>

      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-row">
        <label>
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="button" class="btn-primary" onclick="handleLogin()">
        Sign in to Pet World
      </button>

      <p class="auth-switch">
        Don't have an account?
        <a onclick="switchForm('register')">Register here</a>
      </p>
    </div>

    <!-- Register Form -->
    <div class="auth-form hidden" id="register-form">
      <h2>Create Your Account</h2>

      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" name="name" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="Min. 8 characters" required>
        <p class="password-hint">Must be at least 8 characters.</p>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required style="margin-top:2px;flex-shrink:0;">
        <label for="terms">
          I agree to the <a href="#">Terms and Conditions</a>
        </label>
      </div>

      <button type="button" class="btn-primary" onclick="handleRegister()">
        Create Account
      </button>

      <p class="auth-switch">
        Already have an account?
        <a onclick="switchForm('login')">Login here</a>
      </p>
    </div>

    <div class="auth-back">
      <a href="../index.html">← Back to Pet World Shop</a>
    </div>

  </div>
</div>

<script src="../js/app.js"></script>
<script>
  function switchForm(type) {
    const loginForm    = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const tabLogin     = document.getElementById('tab-login');
    const tabRegister  = document.getElementById('tab-register');

    if (type === 'login') {
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
    } else {
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
      tabLogin.classList.remove('active');
      tabRegister.classList.add('active');
    }
  }

  function handleLogin() {
    const email = document.getElementById('login-email').value;
    if (!email) return alert('Please enter your email.');
    alert('Login functionality coming soon!');
  }

  function handleRegister() {
    const name = document.getElementById('reg-name').value;
    if (!name) return alert('Please enter your name.');
    alert('Registration functionality coming soon!');
  }
</script>
</body>
</html>
